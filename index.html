<!doctype html>
<html lang="en">
  <head>
    <meta charset="UTF-8" />
    <meta name="viewport" content="width=device-width, initial-scale=1.0" />
    <title>Free Local SEO Checkup — See What Google Really Thinks of Your Site</title>
    <meta name="description" content="Get a free, instant local SEO audit of your website. We scan your site the way Google does and show you exactly what's working, what's broken, and how to fix it." />
    <meta name="author" content="SEO Rise Up" />
    <link rel="canonical" href="https://seo-rise-up.com/" />
    <meta name="robots" content="index, follow" />

    <!-- Open Graph -->
    <meta property="og:title" content="Free Local SEO Checkup — See What Google Really Thinks" />
    <meta property="og:description" content="Instant audit of your site's local SEO health. See exactly what Google sees, compare against competitors, and get a personalized fix-it plan." />
    <meta property="og:type" content="website" />
    <meta property="og:url" content="https://seo-rise-up.com/" />
    <meta property="og:site_name" content="SEO Rise Up" />
    <meta property="og:image" content="https://seo-rise-up.com/og-image.jpg" />

    <!-- Twitter Card -->
    <meta name="twitter:card" content="summary_large_image" />
    <meta name="twitter:title" content="Free Local SEO Checkup — See What Google Really Thinks" />
    <meta name="twitter:description" content="Instant audit of your site's local SEO health. Compare against competitors and get a personalized fix-it plan." />
    <meta name="twitter:image" content="https://seo-rise-up.com/og-image.jpg" />

    <!-- JSON-LD: Organization -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "Organization",
      "name": "SEO Rise Up",
      "url": "https://seo-rise-up.com",
      "description": "Free local SEO audit tool that scans your website like Google does and shows you exactly how to rank higher in local search.",
      "sameAs": []
    }
    </script>

    <!-- JSON-LD: SoftwareApplication -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "SoftwareApplication",
      "name": "SEO Rise Up Checkup",
      "applicationCategory": "BusinessApplication",
      "operatingSystem": "Web",
      "offers": {
        "@type": "Offer",
        "price": "0",
        "priceCurrency": "USD"
      },
      "description": "Free instant local SEO audit — scan your website like Google does and get a personalized report with competitor comparison."
    }
    </script>

    <!-- JSON-LD: FAQPage -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "FAQPage",
      "mainEntity": [
        {
          "@type": "Question",
          "name": "What does the Local SEO Checkup scan?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "We scan your website's HTML the same way Google's crawler does — checking meta tags, schema markup, heading structure, local signals, technical SEO, content depth, and more across 5 categories and 30+ individual signals."
          }
        },
        {
          "@type": "Question",
          "name": "Is this really free?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Yes. The full audit and score are completely free with no signup required. We offer optional paid services if you want us to implement the fixes for you."
          }
        },
        {
          "@type": "Question",
          "name": "How is this different from other SEO tools?",
          "acceptedAnswer": {
            "@type": "Answer",
            "text": "Most SEO tools give generic advice. We personalize every finding to your actual business — referencing your real content, phone number, services, and city. Plus we scan your competitors and show you exactly what they're doing that you're not."
          }
        }
      ]
    }
    </script>

    <!-- JSON-LD: BreadcrumbList -->
    <script type="application/ld+json">
    {
      "@context": "https://schema.org",
      "@type": "BreadcrumbList",
      "itemListElement": [
        {
          "@type": "ListItem",
          "position": 1,
          "name": "Home",
          "item": "https://seo-rise-up.com/"
        }
      ]
    }
    </script>
  </head>

  <body>
    <div id="root"></div>
